# Sensor generation spec. Each sensor is keyed by the URDF link it is mounted to.
# Export topics/schemas live under mcap_export.channels.
sensors:
  - link: lidar_link
    type: lidar3d
    hz: 10
    outputs:
      point_cloud: {}
    parameters:
      lidar_type: ideal
      min_distance: 0.1
      max_distance: 30.0
      azimuth_range: [-180.0, 180.0]
      altitude_range: [-15.0, 15.0]
      azimuth_bins: 360
      altitude_bins: 16

  - link: camera_link
    type: camera
    hz: 10
    parameters:
      model: pinhole
      width: 640
      height: 480
      intrinsic: [500.0, 500.0, 320.0, 240.0]
      depth_type: planar
      min_box_px: 8
    modalities: [rgb, depth, semantic, instance, bbox2d, bbox3d]
  - link: imu_link
    type: imu
    hz: 100
    outputs:
      imu: {}
    parameters:
      include_gravity: true
