# Habitat Simulator Scene Configuration (streaming / online-capture pipeline)
# Used by stream_data.py. generate_data.py keeps using config.yaml unchanged.
scene_dataset_config_file: "habitat-sim/data/replica_cad/replicaCAD.scene_dataset_config.json"
scene_id: "apt_0"

# Output configuration
output_dir: "output_mcap"

# Planner selection and type-specific parameters.
planner:
  global:
    type: "zigzag"
    params:
      resolution: 0.05 # m / pixel
      wall_distance: 0.3
      zigzag_spacing: 0.6
      sweep_direction: "horizontal"
      start_corner: "bottom_left"
  local:
    type: "differential_drive"
    params:
      linear_velocity: 0.3       # m/s
      linear_acceleration: 0.5   # m/s^2
      angular_velocity: 1.0      # rad/s
      angular_acceleration: 2.0  # rad/s^2
  # Optional safety cap on simulated trajectory length [s] (remove for full run).
  max_duration_sec: 10.0  
  

# Robot Definition
robot:
  base_link: "base_link"
  # Robot structure is always loaded from a URDF file.
  urdf: assets/robots/cylinder_robot.urdf
  # Sensor generation parameters only. Frame attachment and export channels live here.
  sensors: assets/robots/sensors.yaml

  # Ray-casting backend for range/depth/semantic sensors (lidar, depth camera).
  #   backend: sim  -> habitat-sim sim.cast_ray loop (CPU, original behavior)
  #   backend: gpu  -> Apple Metal two-level BVH (MLX); much faster for large batches
  raycasting:
    backend: gpu          # sim | gpu
    geometry: visual   # (gpu) collision = parity with cast_ray | visual = render mesh
    dynamic: false        # (gpu) refresh moved-object transforms each frame
    leaf_size: 8          # (gpu) BVH leaf size

# MCAP Export configurations mapping pipeline data and sensor outputs to topics/schemas.
mcap_export:
  output_filename: "trajectory_stream.mcap"
  export_map: true
  channels:
    lidar_link:
      point_cloud:
        topic: /lidar
        schema: sensor_msgs/msg/PointCloud2
    camera_link:
      rgb:
        topic: /camera/front/rgb
        schema: sensor_msgs/msg/Image
      depth:
        topic: /camera/front/depth
        schema: sensor_msgs/msg/Image
      semantic:
        topic: /camera/front/semantic
        schema: sensor_msgs/msg/Image
      instance:
        topic: /camera/front/instance
        schema: sensor_msgs/msg/Image
      bbox2d:
        topic: /camera/front/bbox2d
        schema: habitat_msgs/msg/Detection2DArray
      bbox3d:
        topic: /camera/front/bbox3d
        schema: habitat_msgs/msg/Detection3DArray
    imu_link:
      imu:
        topic: /imu
        schema: sensor_msgs/msg/Imu
    pose:
      topic: "/pose"
      schema: "geometry_msgs/msg/PoseStamped"
    occupancy_grid:
      topic: "/map"
      schema: "nav_msgs/msg/OccupancyGrid"
    map_3d_marker_array:
      topic: "/map_3d"
      schema: "visualization_msgs/msg/MarkerArray"
    tf_static:
      topic: "/tf_static"
      schema: "tf2_msgs/msg/TFMessage"
    tf_dynamic:
      topic: "/tf"
      schema: "tf2_msgs/msg/TFMessage"
