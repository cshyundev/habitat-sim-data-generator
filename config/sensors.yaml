# Sensor parameter spec. Each sensor maps to a URDF link by `parent_link` name.
# `topic` and `schema` are top-level and REQUIRED (MCAP channel matching);
# `parameters` holds sensor-physics settings only. No silent fallbacks.
sensors:
  - name: lidar_3d
    type: lidar3d
    parent_link: lidar_link
    hz: 10
    topic: /lidar
    schema: sensor_msgs/msg/PointCloud2
    parameters:
      lidar_type: ideal
      min_distance: 0.1
      max_distance: 30.0
      azimuth_range: [-180.0, 180.0]
      altitude_range: [-15.0, 15.0]
      azimuth_bins: 360
      altitude_bins: 16

  - name: camera_rgb
    type: camera
    parent_link: camera_link
    hz: 10
    topic: /camera/rgb
    schema: sensor_msgs/msg/Image
    parameters:
      model: pinhole
      modality: rgb
      width: 640
      height: 480
      hfov: 90.0

  - name: camera_depth
    type: camera
    parent_link: camera_link
    hz: 10
    topic: /camera/depth
    schema: sensor_msgs/msg/Image
    parameters:
      model: pinhole
      modality: depth
      width: 640
      height: 480
      hfov: 90.0

  - name: camera_semantic
    type: camera
    parent_link: camera_link
    hz: 10
    topic: /camera/semantic
    schema: sensor_msgs/msg/Image
    parameters:
      model: pinhole
      modality: semantic
      width: 640
      height: 480
      hfov: 90.0

  - name: camera_instance
    type: camera
    parent_link: camera_link
    hz: 10
    topic: /camera/instance
    schema: sensor_msgs/msg/Image
    parameters:
      model: pinhole
      modality: instance
      width: 640
      height: 480
      hfov: 90.0

  - name: imu
    type: imu
    parent_link: imu_link
    hz: 100
    topic: /imu
    schema: sensor_msgs/msg/Imu
    parameters: {}
