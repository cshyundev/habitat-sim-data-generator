# Habitat Simulator Scene Configuration
scene_dataset_config_file: "habitat-sim/data/replica_cad/replicaCAD.scene_dataset_config.json"
scene_id: "apt_0"

# Output configuration
output_dir: "output_mcap"
output_filename: "trajectory_data.mcap"

# Path planning configuration (ZigZag)
planner:
  type: "zigzag"
  resolution: 0.05 # m / pixel 
  wall_distance: 0.3
  zigzag_spacing: 0.6
  linear_step: 0.25
  angular_step: 10.0 # degrees
  sweep_direction: "horizontal"
  agent_height: 1.6

# Robot URDF-like Definition
robot:
  base_link: "base_link"
  links:
    - name: "base_link"
      parent: null
      position: [0.0, 0.0, 0.0]
      orientation: [0.0, 0.0, 0.0, 1.0]
    - name: "lidar_link"
      parent: "base_link"
      position: [0.0, 0.3, 0.0]
      orientation: [0.0, 0.0, 0.0, 1.0]
    - name: "camera_link"
      parent: "base_link"
      position: [0.0, 0.5, 0.1]
      orientation: [0.0, 0.0, 0.0, 1.0]
  sensors:
    - name: "lidar_3d"
      type: "lidar3d"
      parent_link: "lidar_link"
      hz: 10
      parameters:
        lidar_type: "ideal"
        min_distance: 0.1
        max_distance: 30.0
        azimuth_range: [-180.0, 180.0]
        altitude_range: [-15.0, 15.0]
        azimuth_bins: 360
        altitude_bins: 16
        topic: "/lidar"
        schema: "sensor_msgs/msg/PointCloud2"
    - name: "camera_rgb"
      type: "camera"
      parent_link: "camera_link"
      hz: 10
      parameters:
        model: "pinhole"
        modality: "rgb"
        width: 640
        height: 480
        hfov: 90.0
        topic: "/camera/rgb"
        schema: "sensor_msgs/msg/Image"
    - name: "camera_depth"
      type: "camera"
      parent_link: "camera_link"
      hz: 10
      parameters:
        model: "pinhole"
        modality: "depth"
        width: 640
        height: 480
        hfov: 90.0
        topic: "/camera/depth"
        schema: "sensor_msgs/msg/Image"


# MCAP Export configurations mapping data types to topics & schemas
mcap_export:
  channels:
    pose:
      topic: "/pose"
      schema: "geometry_msgs/msg/PoseStamped"
    point_cloud:
      topic: "/lidar"
      schema: "sensor_msgs/msg/PointCloud2"
    occupancy_grid:
      topic: "/map"
      schema: "nav_msgs/msg/OccupancyGrid"
    map_3d_marker_array:
      topic: "/map_3d"
      schema: "visualization_msgs/msg/MarkerArray"
    tf_static:
      topic: "/tf_static"
      schema: "tf2_msgs/msg/TFMessage"
    tf_dynamic:
      topic: "/tf"
      schema: "tf2_msgs/msg/TFMessage"
